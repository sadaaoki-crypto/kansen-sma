<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#43a047">
  <title>認定こども園 感染症サポート</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;}
    :root{
      --green:#43a047;--blue:#1e88e5;
      --red:#e53935;--orange:#fb8c00;
    }
    body{
      font-family:'Hiragino Kaku Gothic ProN','Meiryo',sans-serif;
      background:linear-gradient(135deg,#e8f5e9 0%,#e3f2fd 100%);
      height:100dvh;height:100vh;
      display:flex;flex-direction:column;
      align-items:center;justify-content:center;
      overflow:hidden;
    }
    .app{
      width:100%;max-width:700px;
      height:92dvh;height:92vh;
      background:#f5f5f5;
      border-radius:20px;
      box-shadow:0 8px 32px rgba(0,0,0,.15);
      display:flex;flex-direction:column;
      overflow:hidden;
      position:relative;
      z-index:1;
    }
    @media(max-width:600px){
      body{background:white;justify-content:flex-start;}
      .app{height:100dvh;height:100vh;border-radius:0;box-shadow:none;max-width:100%;}
    }

    /* ── Header ── */
    .header{
      background:linear-gradient(135deg,#43a047,#1e88e5);
      color:white;
      padding:14px 16px;
      padding-top:max(14px,env(safe-area-inset-top));
      display:flex;align-items:center;gap:10px;
      flex-shrink:0;
    }
    .header-icon{font-size:24px;}
    .header-text h1{font-size:15px;font-weight:bold;}
    .header-text p{font-size:11px;opacity:.85;margin-top:1px;}
    .status-dot{
      width:8px;height:8px;background:#a5d6a7;
      border-radius:50%;box-shadow:0 0 6px #a5d6a7;
      animation:pulse 2s infinite;margin-right:4px;
    }
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
    .line-share-btn{
      margin-left:auto;display:flex;align-items:center;gap:5px;
      background:#06C755;color:white;border:none;border-radius:20px;
      padding:6px 12px;font-size:12px;font-weight:bold;
      cursor:pointer;font-family:inherit;white-space:nowrap;
      transition:background .2s;
    }
    .line-share-btn:hover{background:#05b04b;}
    @media(max-width:400px){
      .line-share-btn .btn-label{display:none;}
      .line-share-btn{padding:6px 10px;}
    }

    /* ── Tab Views ── */
    .tab-views{flex:1;overflow:hidden;position:relative;}
    .tab-view{
      position:absolute;inset:0;
      display:none;flex-direction:column;overflow:hidden;
    }
    .tab-view.active{display:flex;}

    /* ── Bottom Tab Bar ── */
    .tab-bar{
      display:flex;background:white;
      border-top:1px solid #e0e0e0;
      padding-bottom:max(6px,env(safe-area-inset-bottom));
      flex-shrink:0;
    }
    .tab-item{
      flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;
      padding:8px 4px 4px;border:none;background:white;
      cursor:pointer;font-family:inherit;color:#9e9e9e;font-size:10px;
      transition:color .2s;
    }
    .tab-item .ti{font-size:22px;line-height:1;}
    .tab-item.active{color:var(--green);}

    /* ── Chat ── */
    .chat-area{
      flex:1;overflow-y:auto;padding:14px 12px;
      display:flex;flex-direction:column;gap:10px;
      scroll-behavior:smooth;background:white;
    }
    .message{display:flex;gap:8px;align-items:flex-end;animation:fadeIn .3s ease;}
    @keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
    .message.bot{justify-content:flex-start;}
    .message.user{justify-content:flex-end;}
    .bot-avatar{
      width:32px;height:32px;
      background:linear-gradient(135deg,#43a047,#1e88e5);
      border-radius:50%;display:flex;align-items:center;justify-content:center;
      font-size:16px;flex-shrink:0;
    }
    .bubble{max-width:82%;padding:10px 13px;border-radius:18px;font-size:14px;line-height:1.6;}
    .bot .bubble{background:#f1f8e9;border:1px solid #c8e6c9;border-bottom-left-radius:4px;color:#2e2e2e;}
    .user .bubble{background:linear-gradient(135deg,#1e88e5,#1565c0);color:white;border-bottom-right-radius:4px;}
    .bubble strong{font-weight:700;}
    .bubble .tag{
      display:inline-block;background:#e8f5e9;border:1px solid #a5d6a7;
      color:#2e7d32;border-radius:20px;padding:2px 9px;font-size:12px;margin:2px 2px 2px 0;
    }
    .bubble .tag.red{background:#fce4ec;border-color:#f48fb1;color:#c62828;}
    .bubble .tag.orange{background:#fff3e0;border-color:#ffcc80;color:#e65100;}
    .bubble .tag.blue{background:#e3f2fd;border-color:#90caf9;color:#1565c0;}
    .bubble table{width:100%;border-collapse:collapse;margin-top:8px;font-size:13px;display:block;overflow-x:auto;}
    .bubble table th{background:#c8e6c9;padding:6px 8px;text-align:left;font-size:12px;}
    .bubble table td{padding:6px 8px;border-bottom:1px solid #e0e0e0;}
    .bubble table tr:last-child td{border-bottom:none;}
    .bubble table tr:nth-child(even) td{background:#f9fbe7;}
    .quick-replies{display:flex;flex-wrap:wrap;gap:6px;padding:8px 12px;background:white;border-top:1px solid #f0f0f0;}
    .qr-btn{
      background:white;border:1.5px solid #43a047;color:#2e7d32;
      padding:7px 12px;border-radius:20px;font-size:13px;
      cursor:pointer;transition:all .2s;font-family:inherit;
    }
    .qr-btn:hover,.qr-btn:active{background:#e8f5e9;}
    .input-area{
      padding:10px 12px;border-top:1px solid #e0e0e0;
      display:flex;gap:8px;align-items:center;background:#fafafa;
    }
    .input-area input{
      flex:1;padding:10px 14px;border:1.5px solid #c8e6c9;
      border-radius:24px;font-size:16px;font-family:inherit;
      outline:none;transition:border-color .2s;
    }
    .input-area input:focus{border-color:#43a047;}
    .send-btn{
      width:42px;height:42px;
      background:linear-gradient(135deg,#43a047,#1e88e5);
      border:none;border-radius:50%;cursor:pointer;
      display:flex;align-items:center;justify-content:center;
      font-size:18px;transition:transform .2s;flex-shrink:0;
    }
    .send-btn:hover{transform:scale(1.1);}
    .typing{display:flex;gap:4px;align-items:center;padding:4px 0;}
    .typing span{width:7px;height:7px;background:#43a047;border-radius:50%;animation:bounce 1.2s infinite;}
    .typing span:nth-child(2){animation-delay:.2s}
    .typing span:nth-child(3){animation-delay:.4s}
    @keyframes bounce{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-8px)}}

    /* ── Disease List ── */
    .disease-view{overflow-y:auto;padding:12px;background:#f5f5f5;}
    .filter-row{display:flex;gap:8px;margin-bottom:12px;overflow-x:auto;padding-bottom:4px;}
    .filter-chip{
      display:flex;align-items:center;gap:4px;padding:6px 14px;
      border-radius:20px;border:1.5px solid #c8e6c9;background:white;
      color:#555;font-size:13px;cursor:pointer;font-family:inherit;
      white-space:nowrap;transition:all .2s;flex-shrink:0;
    }
    .filter-chip.active{background:var(--green);color:white;border-color:var(--green);}
    .filter-chip.fc-red.active{background:var(--red);border-color:var(--red);}
    .filter-chip.fc-orange.active{background:var(--orange);border-color:var(--orange);}
    .sec-title{font-size:11px;color:#888;font-weight:bold;margin:4px 2px 8px;letter-spacing:.5px;}
    .disease-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:16px;}
    .disease-card{
      background:white;border:1.5px solid #e0e0e0;border-radius:14px;
      padding:12px;cursor:pointer;transition:all .2s;
      text-align:left;font-family:inherit;width:100%;
    }
    .disease-card:hover,.disease-card:active{transform:translateY(-2px);box-shadow:0 4px 12px rgba(0,0,0,.1);}
    .disease-card.red{border-color:#ffcdd2;background:#fff8f8;}
    .disease-card.red:hover{border-color:#ef9a9a;}
    .disease-card.orange{border-color:#ffe0b2;background:#fffbf7;}
    .disease-card.orange:hover{border-color:#ffcc80;}
    .card-badge{
      display:inline-flex;align-items:center;gap:3px;
      font-size:10px;font-weight:bold;padding:2px 8px;
      border-radius:10px;margin-bottom:7px;
    }
    .card-badge.red{background:#fce4ec;color:#c62828;}
    .card-badge.orange{background:#fff3e0;color:#e65100;}
    .card-name{font-size:14px;font-weight:bold;color:#2e2e2e;margin-bottom:4px;line-height:1.3;}
    .card-hint{font-size:11px;color:#888;line-height:1.4;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
    .card-arrow{text-align:right;font-size:12px;color:#bbb;margin-top:6px;}

    /* ── Bottom Sheet ── */
    .sheet-overlay{
      position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;
      opacity:0;pointer-events:none;transition:opacity .3s;
    }
    .sheet-overlay.open{opacity:1;pointer-events:auto;}
    .bottom-sheet{
      position:fixed;bottom:0;left:50%;
      width:100%;max-width:700px;
      background:white;border-radius:20px 20px 0 0;
      max-height:82vh;overflow-y:auto;z-index:201;
      transform:translateX(-50%) translateY(100%);
      transition:transform .35s cubic-bezier(.4,0,.2,1);
      padding-bottom:max(20px,env(safe-area-inset-bottom));
    }
    .sheet-overlay.open .bottom-sheet{transform:translateX(-50%) translateY(0);}
    .sheet-handle{width:36px;height:4px;background:#ddd;border-radius:2px;margin:12px auto 0;}
    .sheet-content{padding:16px 20px 24px;}
    .sheet-title{font-size:19px;font-weight:bold;color:#2e2e2e;margin-bottom:4px;}
    .sheet-badge{display:inline-flex;align-items:center;gap:4px;font-size:12px;font-weight:bold;padding:3px 10px;border-radius:12px;margin-bottom:14px;}
    .sheet-badge.red{background:#fce4ec;color:#c62828;}
    .sheet-badge.orange{background:#fff3e0;color:#e65100;}
    .sheet-sec{margin-bottom:14px;}
    .sheet-lbl{font-size:11px;font-weight:bold;color:#888;letter-spacing:.5px;margin-bottom:5px;}
    .sheet-val{font-size:14px;color:#333;line-height:1.6;}
    .stop-pill{
      display:inline-block;padding:6px 14px;border-radius:20px;
      font-size:13px;font-weight:bold;
    }
    .stop-pill.red{background:#fce4ec;color:#c62828;}
    .stop-pill.orange{background:#fff3e0;color:#e65100;}
    .law-box{background:#e3f2fd;color:#1565c0;border-radius:8px;padding:8px 12px;font-size:12px;line-height:1.6;}
    .sheet-actions{display:flex;gap:10px;margin-top:20px;}
    .sheet-chat-btn{
      flex:1;padding:13px;
      background:linear-gradient(135deg,#43a047,#1e88e5);
      color:white;border:none;border-radius:12px;
      font-size:14px;font-weight:bold;cursor:pointer;font-family:inherit;
    }
    .sheet-close-btn{
      padding:13px 20px;background:white;
      border:1.5px solid #ddd;border-radius:12px;
      font-size:14px;cursor:pointer;font-family:inherit;
    }

    /* ── Prevention & Flow tabs ── */
    .info-view{overflow-y:auto;padding:14px 12px;background:#f5f5f5;}
    .info-card{background:white;border-radius:14px;padding:14px 16px;margin-bottom:12px;border:1px solid #e8e8e8;}
    .info-card-head{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
    .info-icon{font-size:24px;}
    .info-title{font-size:15px;font-weight:bold;color:#2e2e2e;}
    .info-body{font-size:13px;color:#444;line-height:1.7;}
    .info-step{display:flex;gap:10px;margin-bottom:8px;align-items:flex-start;}
    .step-num{
      width:24px;height:24px;border-radius:50%;
      background:#43a047;color:white;
      display:flex;align-items:center;justify-content:center;
      font-size:12px;font-weight:bold;flex-shrink:0;
    }
    .step-text{font-size:13px;color:#333;line-height:1.6;padding-top:2px;}
    .vax-chips{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px;}
    .vax-chip{background:#e3f2fd;color:#1565c0;border:1px solid #90caf9;border-radius:16px;padding:4px 12px;font-size:12px;}

    /* flow */
    .flow-head{font-size:14px;font-weight:bold;color:white;background:linear-gradient(135deg,#43a047,#1e88e5);border-radius:10px;padding:8px 14px;margin-bottom:12px;}
    .flow-step{display:flex;gap:12px;position:relative;}
    .flow-left{display:flex;flex-direction:column;align-items:center;}
    .flow-num{
      width:32px;height:32px;border-radius:50%;
      background:white;border:2.5px solid #43a047;color:#43a047;
      display:flex;align-items:center;justify-content:center;
      font-weight:bold;font-size:14px;flex-shrink:0;z-index:1;
    }
    .flow-line{width:2px;flex:1;background:#c8e6c9;margin:0 auto;min-height:16px;}
    .flow-body{flex:1;padding-bottom:16px;padding-top:4px;}
    .flow-title{font-size:14px;font-weight:bold;color:#2e2e2e;margin-bottom:4px;}
    .flow-desc{font-size:13px;color:#555;line-height:1.6;}
    .flow-tag{display:inline-block;background:#e8f5e9;border:1px solid #a5d6a7;color:#2e7d32;border-radius:6px;padding:2px 8px;font-size:11px;margin:3px 2px 0 0;}
    .flow-tag.red{background:#fce4ec;border-color:#f48fb1;color:#c62828;}
    .alert-box{background:#fff8e1;border:1px solid #ffe082;border-radius:10px;padding:12px 14px;font-size:13px;color:#795548;line-height:1.6;margin-top:10px;}

    /* ── LINE Modal ── */
    .modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:300;align-items:center;justify-content:center;}
    .modal-overlay.open{display:flex;}
    .modal{background:white;border-radius:16px;padding:22px;width:90%;max-width:420px;box-shadow:0 8px 32px rgba(0,0,0,.2);animation:slideUp .25s ease;margin:0 10px;}
    @keyframes slideUp{from{transform:translateY(30px);opacity:0}to{transform:translateY(0);opacity:1}}
    .modal h2{font-size:15px;color:#06C755;margin-bottom:8px;display:flex;align-items:center;gap:8px;}
    .modal label{font-size:13px;font-weight:bold;color:#333;display:block;margin-bottom:6px;}
    .modal input[type=text]{width:100%;padding:9px 12px;border:1.5px solid #c8e6c9;border-radius:8px;font-size:16px;font-family:inherit;outline:none;margin-bottom:14px;}
    .modal input[type=text]:focus{border-color:#06C755;}
    .modal-actions{display:flex;gap:10px;justify-content:flex-end;}
    .btn-cancel{padding:9px 16px;border:1.5px solid #ccc;background:white;border-radius:8px;font-size:14px;cursor:pointer;font-family:inherit;}
    .btn-line{padding:9px 16px;background:#06C755;color:white;border:none;border-radius:8px;font-size:14px;font-weight:bold;cursor:pointer;font-family:inherit;display:flex;align-items:center;gap:6px;}
    .notice-box{background:#fff8e1;border:1px solid #ffe082;border-radius:8px;padding:10px 12px;font-size:12px;color:#795548;margin-bottom:14px;line-height:1.6;}
    .copy-url-row{display:flex;gap:6px;margin-bottom:14px;}
    .copy-url-row input{flex:1;margin-bottom:0!important;}
    .btn-copy{padding:9px 12px;background:#e3f2fd;border:1.5px solid #90caf9;border-radius:8px;font-size:13px;cursor:pointer;font-family:inherit;white-space:nowrap;}
    .copied-msg{font-size:12px;color:#06C755;margin-top:-10px;margin-bottom:10px;display:none;}
  </style>
</head>
<body>
<div class="app">

  <!-- Header -->
  <div class="header">
    <div class="header-icon">🏫</div>
    <div class="header-text">
      <h1>認定こども園 感染症サポート</h1>
      <p>症状・登園基準・対応フローを案内</p>
    </div>
    <div class="status-dot"></div>
    <button class="line-share-btn" onclick="openLineModal()">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="white"><path d="M19.365 9.863c.349 0 .63.285.63.631 0 .345-.281.63-.63.63H17.61v1.125h1.755c.349 0 .63.283.63.63 0 .344-.281.629-.63.629h-2.386c-.345 0-.627-.285-.627-.629V8.108c0-.345.282-.63.627-.63h2.386c.349 0 .63.285.63.63 0 .349-.281.63-.63.63H17.61v1.125h1.755zm-3.855 3.016c0 .27-.174.51-.432.596-.064.021-.133.031-.199.031-.211 0-.391-.09-.51-.25l-2.443-3.317v2.94c0 .344-.279.629-.631.629-.346 0-.626-.285-.626-.629V8.108c0-.27.173-.51.43-.595.06-.023.136-.033.194-.033.195 0 .375.104.495.254l2.462 3.33V8.108c0-.345.282-.63.63-.63.345 0 .63.285.63.63v4.771zm-5.741 0c0 .344-.282.629-.631.629-.345 0-.627-.285-.627-.629V8.108c0-.345.282-.63.627-.63.349 0 .631.285.631.63v4.771zm-2.466.629H4.917c-.345 0-.63-.285-.63-.629V8.108c0-.345.285-.63.63-.63.348 0 .63.285.63.63v4.141h1.756c.348 0 .629.283.629.63 0 .344-.281.629-.629.629M24 10.314C24 4.943 18.615.572 12 .572S0 4.943 0 10.314c0 4.811 4.27 8.842 10.035 9.608.391.082.923.258 1.058.59.12.301.079.766.038 1.08l-.164 1.02c-.045.301-.24 1.186 1.049.645 1.291-.539 6.916-4.070 9.436-6.975C23.176 14.393 24 12.458 24 10.314"/></svg>
      <span class="btn-label">LINEで送る</span>
    </button>
  </div>

  <!-- Tab Views -->
  <div class="tab-views">

    <!-- Chat -->
    <div class="tab-view active" id="view-chat">
      <div class="chat-area" id="chatArea"></div>
      <div class="quick-replies" id="quickReplies"></div>
      <div class="input-area">
        <input type="text" id="userInput" placeholder="例：インフルエンザの登園停止期間は？">
        <button class="send-btn" onclick="handleSend()">✈️</button>
      </div>
    </div>

    <!-- Disease List -->
    <div class="tab-view" id="view-diseases">
      <div class="disease-view" id="diseaseView"></div>
    </div>

    <!-- Prevention -->
    <div class="tab-view" id="view-prevention">
      <div class="info-view" id="preventionView"></div>
    </div>

    <!-- Flow -->
    <div class="tab-view" id="view-flow">
      <div class="info-view" id="flowView"></div>
    </div>

  </div>

  <!-- Bottom Tab Bar -->
  <nav class="tab-bar">
    <button class="tab-item active" data-tab="chat" onclick="switchTab('chat')">
      <span class="ti">💬</span>チャット
    </button>
    <button class="tab-item" data-tab="diseases" onclick="switchTab('diseases')">
      <span class="ti">🦠</span>感染症
    </button>
    <button class="tab-item" data-tab="prevention" onclick="switchTab('prevention')">
      <span class="ti">🛡️</span>予防
    </button>
    <button class="tab-item" data-tab="flow" onclick="switchTab('flow')">
      <span class="ti">📋</span>対応フロー
    </button>
  </nav>
</div>

<!-- Bottom Sheet -->
<div class="sheet-overlay" id="sheetOverlay" onclick="maybeCloseSheet(event)">
  <div class="bottom-sheet" id="bottomSheet">
    <div class="sheet-handle"></div>
    <div class="sheet-content" id="sheetContent"></div>
  </div>
</div>

<!-- LINE Modal -->
<div class="modal-overlay" id="lineModal">
  <div class="modal">
    <h2>

function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

// ─── Tab Navigation ────────────────────────────────────────
function switchTab(tab) {
  document.querySelectorAll('.tab-item').forEach(el =>
    el.classList.toggle('active', el.dataset.tab === tab));
  document.querySelectorAll('.tab-view').forEach(el =>
    el.classList.toggle('active', el.id === 'view-' + tab));
}

// ─── Disease List View ────────────────────────────────────
let currentFilter = 'all';

function buildDiseaseView() {
  const view = document.getElementById('diseaseView');
  view.innerHTML = `
    <div class="filter-row">
      <button class="filter-chip active" data-f="all" onclick="filterDiseases('all',this)">すべて</button>
      <button class="filter-chip fc-red" data-f="red" onclick="filterDiseases('red',this)">🔴 法定停止</button>
      <button class="filter-chip fc-orange" data-f="orange" onclick="filterDiseases('orange',this)">🟡 停止推奨</button>
    </div>
    <div id="diseaseCards"></div>
  `;
  renderDiseaseCards('all');
}

function filterDiseases(f, btn) {
  currentFilter = f;
  document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
  btn.classList.add('active');
  renderDiseaseCards(f);
}

function renderDiseaseCards(f) {
  const container = document.getElementById('diseaseCards');
  const redDiseases = Object.entries(KB.diseases).filter(([,i]) => i.stopClass === 'red');
  const orangeDiseases = Object.entries(KB.diseases).filter(([,i]) => i.stopClass === 'orange');

  let html = '';
  if (f === 'all' || f === 'red') {
    html += `<div class="sec-title">🔴 法定停止（学校保健安全法）</div><div class="disease-grid">`;
    redDiseases.forEach(([name, info]) => { html += diseaseCardHTML(name, info); });
    html += `</div>`;
  }
  if (f === 'all' || f === 'orange') {
    html += `<div class="sec-title">🟡 停止推奨（園方針）</div><div class="disease-grid">`;
    orangeDiseases.forEach(([name, info]) => { html += diseaseCardHTML(name, info); });
    html += `</div>`;
  }
  container.innerHTML = html;
}

function diseaseCardHTML(name, info) {
  const badgeLabel = info.stopClass === 'red' ? '法定停止' : '停止推奨';
  const mark = info.stopClass === 'red' ? '🔴' : '🟡';
  return `<button class="disease-card ${info.stopClass}" onclick="openSheet('${esc(name)}')">
    <div class="card-badge ${info.stopClass}">${mark} ${badgeLabel}</div>
    <div class="card-name">${esc(name)}</div>
    <div class="card-hint">${esc(info.symptoms)}</div>
    <div class="card-arrow">詳細を見る →</div>
  </button>`;
}

// ─── Bottom Sheet ─────────────────────────────────────────
function openSheet(name) {
  const info = KB.diseases[name];
  if (!info) return;
  const mark = info.stopClass === 'red' ? '🔴' : '🟡';
  const badgeLabel = info.stopClass === 'red' ? '法定停止' : '停止推奨';
  document.getElementById('sheetContent').innerHTML = `
    <div class="sheet-title">${esc(name)}</div>
    <div class="sheet-badge ${info.stopClass}">${mark} ${badgeLabel}</div>
    <div class="sheet-sec">
      <div class="sheet-lbl">主な症状</div>
      <div class="sheet-val">${esc(info.symptoms)}</div>
    </div>
    <div class="sheet-sec">
      <div class="sheet-lbl">登園停止の基準</div>
      <div class="stop-pill ${info.stopClass}">${esc(info.stop)}</div>
    </div>
    <div class="sheet-sec">
      <div class="sheet-lbl">予防・対処法</div>
      <div class="sheet-val">${esc(info.prevention)}</div>
    </div>
    <div class="sheet-sec">

      <div class="law-box">${esc(info.law)}</div>
    </div>
    <div class="sheet-actions">

      <button class="sheet-close-btn" onclick="closeSheet()">閉じる</button>
    </div>
  `;
  document.getElementById('sheetOverlay').classList.add('open');
}

function maybeCloseSheet(e) {
  if (e.target === document.getElementById('sheetOverlay')) closeSheet();
}
function closeSheet() {
  document.getElementById('sheetOverlay').classList.remove('open');
}

function askInChat(name) {
  closeSheet();
  switchTab('chat');
  setTimeout(() => {
    addMessage(name, false);
    process(name);
  }, 100);
}

        <div class="info-step"><div class="step-num">1</div><div class="step-text">複数人発症 → <strong>保健所へ報告</strong>を検討</div></div>
        <div class="info-step"><div class="step-num">2</div><div class="step-text">消毒・換気を強化する</div></div>
        <div class="info-step"><div class="step-num">3</div><div class="step-text">嘱託医に相談の上、登園停止措置を判断する</div></div>
      </div>
      <div class="alert-box">📞 保健所への相談窓口は各自治体の衛生担当課にお問い合わせください。</div>
    </div>
  `;
}

// ─── Chat Logic ───────────────────────────────────────────
function getResponse(input) {
  const t = input.trim();

  if (/一覧|リスト|種類|どんな感染症|病気の種類/.test(t)) {
    return {
      text: `<strong>🦠 主な感染症一覧</strong><br><br>` +
        Object.keys(KB.diseases).map(d => `<span class="tag">${esc(d)}</span>`).join('') +
        `<br><br>「感染症」タブで一覧をボタン操作で閲覧できます。`,
      suggestions: ["インフルエンザ", "手足口病", "登園停止一覧", "予防方法"]
    };
  }

  if (/登園停止.*一覧|出席停止.*一覧|全部.*停止|停止期間.*まとめ/.test(t)) {
    const rows = Object.entries(KB.diseases).map(([name, info]) => {
      const mark = info.stopClass === 'red' ? '🔴' : '🟡';
      return `<tr><td>${mark} ${esc(name)}</td><td>${esc(info.stop)}</td></tr>`;
    }).join('');
    return {
      text: `<strong>📋 登園停止期間一覧</strong><br>` +
        `<table><tr><th>感染症</th><th>停止の目安</th></tr>${rows}</table>` +
        `<br><small>🔴 = 学校保健安全法による出席停止対象<br>🟡 = 園の方針による停止推奨</small>`,
      suggestions: ["インフルエンザの詳細", "予防方法", "保護者への連絡フロー"]
    };
  }

  if (/予防|対処|消毒|手洗い|感染させない|拡大防止/.test(t)) {
    return {
      text: `<strong>🛡️ 感染症の予防・対処法</strong><br><br>` +
        `① <strong>手洗い</strong>：石けんで30秒以上、流水でしっかり洗う<br>` +
        `② <strong>換気</strong>：1〜2時間ごとに窓を開けて換気<br>` +
        `③ <strong>咳エチケット</strong>：マスク着用、ハンカチで口を押さえる<br>` +
        `④ <strong>消毒</strong>：ドアノブ・おもちゃをアルコールまたは次亜塩素酸ナトリウムで拭く<br>` +
        `⑤ <strong>タオル共用禁止</strong>：各自ハンカチを持参<br><br>` +
        `詳しくは「予防」タブをご確認ください。`,
      suggestions: ["保護者への連絡フロー", "登園停止一覧", "インフルエンザ", "ノロウイルス"]
    };
  }

  if (/保護者|連絡|フロー|手順|対応|どうすれば|発症したら|感染したら|どうしたら/.test(t)) {
    return {
      text: `<strong>📞 感染症発症時の対応フロー</strong><br><br>` +
        `<strong>【園内で症状を発見した場合】</strong><br>` +
        `1️⃣ 隔離 → 2️⃣ 保護者へ連絡 → 3️⃣ 記録 → 4️⃣ 受診の案内<br><br>` +
        `<strong>【家庭で診断された場合】</strong><br>` +
        `1️⃣ 保護者から連絡 → 2️⃣ 登園許可証の確認 → 3️⃣ 周知<br><br>` +
        `詳しい手順は「対応フロー」タブでご確認いただけます。`,
      suggestions: ["登園停止一覧", "予防方法", "インフルエンザ", "ノロウイルス"]
    };
  }

  // 特定の感染症
  const aliases = {
    "インフルエンザ": ["インフル","flu"],
    "ノロウイルス": ["ノロ","嘔吐","下痢"],
    "手足口病": ["手足口"],
    "水痘（水ぼうそう）": ["水ぼうそう","水痘","みずぼうそう"],
    "おたふくかぜ": ["おたふく","流行性耳下腺炎","耳下腺"],
    "麻疹（はしか）": ["はしか","麻疹"],
    "溶連菌感染症": ["溶連菌","溶レン菌","猩紅熱"],
    "咽頭結膜熱（プール熱）": ["プール熱","咽頭結膜熱"],
    "流行性角結膜炎": ["はやり目","角結膜炎"],
    "新型コロナウイルス": ["コロナ","covid","COVID"],
    "RSウイルス": ["RS","rsウイルス"],
  };
  for (const [name, info] of Object.entries(KB.diseases)) {
    const terms = [name, ...(aliases[name] || [])];
    if (terms.some(term => t.includes(term))) {
      const others = Object.keys(KB.diseases).filter(d => d !== name);
      return {
        text: `<strong>🦠 ${esc(name)}</strong><br><br>` +
          `<strong>【主な症状】</strong><br>${esc(info.symptoms)}<br><br>` +
          `<strong>【登園停止の基準】</strong><br>` +
          `<span class="tag ${info.stopClass}">${esc(info.stop)}</span><br><br>` +
          `<strong>【予防・対処法】</strong><br>${esc(info.prevention)}<br><br>` +
          `<strong>【法的根拠】</strong><br><span class="tag blue">${esc(info.law)}</span>`,
        suggestions: ["登園停止一覧", "保護者への連絡フロー", "予防方法",
          others[Math.floor(Math.random() * others.length)]]
      };
    }
  }

  if (/いつ.*登園|復帰|登園.*いつ|登園.*できる|いつから/.test(t)) {
    return {
      text: `<strong>🗓️ 登園再開について</strong><br><br>` +
        `登園基準は感染症の種類によって異なります。<br><br>` +
        `• <strong>学校保健安全法対象</strong>（インフルエンザ・水痘等）<br>　→ 法定期間終了後、<strong>医師の登園許可証</strong>が必要<br><br>` +
        `• <strong>法定外</strong>（手足口病・ノロウイルス等）<br>　→ 症状消退後、<strong>医師に確認してから</strong>登園<br><br>` +
        `病名を入力すると具体的な基準をお伝えします。`,
      suggestions: ["登園停止一覧", "インフルエンザ", "手足口病", "ノロウイルス"]
    };
  }

  if (/発熱|熱がある|熱が出た|体温|37|38|39|40/.test(t)) {
    return {
      text: `<strong>🌡️ 発熱時の対応</strong><br><br>` +
        `• <strong>37.5℃以上</strong> → 登園を控える<br>` +
        `• <strong>解熱後24時間以上</strong> → 状態を見ながら登園可（感染症の場合は別途基準あり）<br><br>` +
        `<strong>【園での対応】</strong><br>` +
        `① 体温確認 → ② 涼しい場所で安静・水分補給 → ③ 保護者へ連絡`,
      suggestions: ["インフルエンザ", "ヘルパンギーナ", "手足口病", "保護者への連絡フロー"]
    };
  }

  if (/こんにちは|こんにちわ|はじめまして|よろしく|hello|hi/.test(t.toLowerCase())) {
    return {
      text: `こんにちは！😊<br><br><strong>認定こども園 感染症サポートBot</strong>です。<br><br>` +
        `🦠 感染症の種類・症状<br>` +
        `🗓️ 登園停止・出席停止の基準<br>` +
        `🛡️ 予防・消毒の方法<br>` +
        `📞 保護者への対応フロー<br><br>` +
        `下のタブからも各情報を閲覧できます。`,
      suggestions: ["感染症の一覧", "登園停止一覧", "予防方法", "保護者への連絡フロー"]
    };
  }

  return {
    text: `「<strong>${esc(t)}</strong>」についての情報は見つかりませんでした。<br><br>` +
      `🦠 感染症名（例：インフルエンザ、手足口病）<br>` +
      `🗓️「登園停止一覧」<br>🛡️「予防方法」<br>📞「保護者への連絡フロー」<br><br>` +
      `入力するか、下のボタンからお選びください。`,
    suggestions: ["感染症の一覧", "登園停止一覧", "予防方法", "保護者への連絡フロー"]
  };
}

// ─── Chat UI ──────────────────────────────────────────────
const chatArea = document.getElementById('chatArea');
const qrContainer = document.getElementById('quickReplies');
const userInput = document.getElementById('userInput');

function addMessage(text, isBot) {
  const msg = document.createElement('div');
  msg.className = `message ${isBot ? 'bot' : 'user'}`;
  if (isBot) {
    msg.innerHTML = `<div class="bot-avatar">🏫</div><div class="bubble">${text}</div>`;
  } else {
    const safe = esc(text);
    msg.innerHTML = `<div class="bubble">${safe}</div>`;
  }
  chatArea.appendChild(msg);
  chatArea.scrollTop = chatArea.scrollHeight;
}

function showTyping() {
  const msg = document.createElement('div');
  msg.className = 'message bot'; msg.id = 'typing';
  msg.innerHTML = `<div class="bot-avatar">🏫</div><div class="bubble"><div class="typing"><span></span><span></span><span></span></div></div>`;
  chatArea.appendChild(msg);
  chatArea.scrollTop = chatArea.scrollHeight;
}
function removeTyping() { const t = document.getElementById('typing'); if (t) t.remove(); }

function setQuickReplies(items) {
  qrContainer.innerHTML = '';
  items.forEach(label => {
    const btn = document.createElement('button');
    btn.className = 'qr-btn';
    btn.textContent = label;
    btn.onclick = () => { addMessage(label, false); qrContainer.innerHTML = ''; process(label); };
    qrContainer.appendChild(btn);
  });
}

function process(text) {
  showTyping();
  setTimeout(() => {
    removeTyping();
    const res = getResponse(text);
    addMessage(res.text, true);
    if (res.suggestions) setQuickReplies(res.suggestions);
  }, 600);
}

function handleSend() {
  const val = userInput.value.trim();
  if (!val) return;
  userInput.value = '';
  addMessage(val, false);
  qrContainer.innerHTML = '';
  process(val);
}

userInput.addEventListener('keydown', e => { if (e.key === 'Enter') handleSend(); });

if (window.visualViewport) {
  window.visualViewport.addEventListener('resize', () => {
    document.querySelector('.app').style.height = window.visualViewport.height + 'px';
  });
}
userInput.addEventListener('focus', () => {
  setTimeout(() => { chatArea.scrollTop = chatArea.scrollHeight; }, 350);
});

// ─── LINE Share ───────────────────────────────────────────
function openLineModal() {
  document.getElementById('lineModal').classList.add('open');
  const cur = window.location.href;
  if (cur.startsWith('http')) document.getElementById('shareUrl').value = cur;
}
function closeLineModal() { document.getElementById('lineModal').classList.remove('open'); }
function copyUrl() {
  const url = document.getElementById('shareUrl').value.trim();
  if (!url) { alert('URLを入力してください'); return; }
  navigator.clipboard.writeText(url).then(() => {
    const m = document.getElementById('copiedMsg');
    m.style.display = 'block';
    setTimeout(() => { m.style.display = 'none'; }, 2000);
  });
}
function doLineShare() {
  const url = document.getElementById('shareUrl').value.trim();
  const text = document.getElementById('shareMsg').value.trim();
  if (!url) { alert('共有するURLを入力してください。'); return; }
  window.open(`https://social-plugins.line.me/lineit/share?url=${encodeURIComponent(url)}&text=${encodeURIComponent(text)}`, '_blank');
  closeLineModal();
}
document.getElementById('lineModal').addEventListener('click', function(e) {
  if (e.target === this) closeLineModal();
});
